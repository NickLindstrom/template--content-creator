  <body class="site-body">
    <a class="skip-link" href="#main-content">Hoppa till innehåll</a>

        <a id="header-brand" class="brand-mark" href="#top" aria-label="Till startsidan"><span class="brand-mark__text">Laddar...</span></a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation">Meny</button>

          <a id="nav-cta-link" class="site-navigation__link site-navigation__link--cta" href="#contact">Kontakt</a>

    <main id="main-content">
      <section id="top" class="hero-section">

          <div class="hero-content">

            <h1 id="hero-headline" class="hero-title"></h1>

          <p id="intro-body" class="section-text"></p>
        </div>

      <section id="services" class="services-section section-spacing section-surface">

      <section id="gallery" class="gallery-section section-spacing" hidden>

          <div id="gallery-grid" class="gallery-grid"></div>
        </div>

      <section id="testimonials-section" class="testimonials-section section-spacing" hidden>
